<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Autorización - Pago Electrónico</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1,h2{
      text-align:center;
      color:#333;
    }

    .section{
      margin-top:25px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .full{
      grid-column:1 / 3;
    }

    label{
      font-weight:bold;
      display:block;
      margin-bottom:5px;
    }

    input, select, textarea{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
      box-sizing:border-box;
    }

    textarea{
      resize:vertical;
    }

    .banks{
      columns:2;
      margin-top:10px;
    }

    .banks label{
      font-weight:normal;
      display:block;
      margin-bottom:5px;
    }

    .btn{
      margin-top:25px;
      text-align:center;
    }

    button{
      background:#007bff;
      color:white;
      border:none;
      padding:12px 25px;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#0056b3;
    }

    @media(max-width:768px){
      .grid{
        grid-template-columns:1fr;
      }

      .full{
        grid-column:auto;
      }

      .banks{
        columns:1;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Formulario de Autorización</h1>
    <h2>Pago Electrónico</h2>

    <!-- DATOS DE IDENTIFICACIÓN -->
    <div class="section">
      <h3>Datos de Identificación</h3>

      <div class="grid">

        <div>
          <label>Razón Social</label>
          <input type="text">
        </div>

        <div>
          <label>CUIT N°</label>
          <input type="text">
        </div>

        <div class="full">
          <label>Domicilio</label>
          <input type="text">
        </div>

        <div>
          <label>Contrato N°</label>
          <input type="text">
        </div>

        <div>
          <label>Localidad</label>
          <input type="text">
        </div>

        <div>
          <label>Teléfono</label>
          <input type="text">
        </div>

        <div>
          <label>E-mail</label>
          <input type="email">
        </div>

      </div>
    </div>

    <!-- DATOS BANCARIOS -->
    <div class="section">
      <h3>Datos de la Cuenta Bancaria</h3>

      <div class="grid">

        <div>
          <label>Titular de la Cuenta</label>
          <input type="text">
        </div>

        <div>
          <label>CUIT Titular de la Cuenta</label>
          <input type="text">
        </div>

        <div>
          <label>Número de Cuenta</label>
          <input type="text">
        </div>

        <div>
          <label>CBU</label>
          <input type="text">
        </div>

        <div>
          <label>Tipo de Cuenta</label>
          <select>
            <option>Seleccione</option>
            <option>Caja de Ahorro</option>
            <option>Cuenta Corriente</option>
          </select>
        </div>

        <div>
          <label>Sucursal del Banco</label>
          <input type="text">
        </div>

      </div>
    </div>

    <!-- BANCOS -->
    <div class="section">
      <h3>Banco</h3>

      <div class="banks">

        <label><input type="radio" name="banco"> Banco Nación</label>
        <label><input type="radio" name="banco"> Banco Galicia</label>
        <label><input type="radio" name="banco"> Banco Macro</label>
        <label><input type="radio" name="banco"> Banco Santander</label>
        <label><input type="radio" name="banco"> BBVA</label>
        <label><input type="radio" name="banco"> Banco Provincia</label>
        <label><input type="radio" name="banco"> Banco Supervielle</label>
        <label><input type="radio" name="banco"> Banco Patagonia</label>
        <label><input type="radio" name="banco"> HSBC</label>
        <label><input type="radio" name="banco"> Banco de Córdoba</label>
        <label><input type="radio" name="banco"> Otro</label>

      </div>
    </div>

    <!-- AUTORIZACIÓN -->
    <div class="section">
      <h3>Autorización</h3>

      <textarea rows="10">
Por medio del presente autorizo a PREVENCIÓN ART SA a efectuar el pago mediante Transferencia Electrónica de Fondos, declarando bajo juramento la veracidad de los datos proporcionados.
      </textarea>
    </div>

    <!-- FIRMA -->
    <div class="section">
      <h3>Firma</h3>

      <div class="grid">

        <div>
          <label>Firma del Representante Legal / Titular</label>
          <input type="text">
        </div>

        <div>
          <label>Tipo y N° de Documento</label>
          <input type="text">
        </div>

        <div class="full">
          <label>Aclaración</label>
          <input type="text">
        </div>

      </div>
    </div>

    <!-- BOTÓN -->
    <div class="btn">
      <button type="submit">Enviar Formulario</button>
    </div>

  </div>

</body>
</html>
