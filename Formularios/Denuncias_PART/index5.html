<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prevención ART - Denuncia</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/Formularios/Denuncias_PART/styles5.css">
</head>

<body>

    <div class="container">

        <!-- ENCABEZADO -->

        <header class="header">

            <h1>PREVENCIÓN ART</h1>

            <h2>
                INFORME DE ACCIDENTE DE TRABAJO O
                ENFERMEDAD PROFESIONAL
            </h2>

            <div class="badge">
                DENUNCIA
            </div>

        </header>

        <!-- DATOS DEL TRABAJADOR -->

        <section class="card">

            <h3>Datos del Trabajador</h3>

            <div class="grid">

                <div class="full">
                    <label>Apellido y Nombre</label>
                    <input type="text">
                </div>

                <div>
                    <label>CUIL</label>
                    <input type="text">
                </div>

                <div>
                    <label>Tipo y N° de Documento</label>
                    <input type="text">
                </div>

                <div class="full">
                    <label>Domicilio</label>
                    <input type="text">
                </div>

                <div>
                    <label>Provincia</label>
                    <input type="text">
                </div>

                <div>
                    <label>Localidad</label>
                    <input type="text">
                </div>

                <div>
                    <label>Código Postal</label>
                    <input type="text">
                </div>

                <div>
                    <label>Teléfono</label>
                    <input type="text">
                </div>

                <div>
                    <label>Fecha de Nacimiento</label>
                    <input type="date">
                </div>

                <div>
                    <label>Nacionalidad</label>
                    <input type="text">
                </div>

                <div>
                    <label>Sexo</label>

                    <div class="radio-group">
                        <label><input type="radio" name="sexo"> Masculino</label>
                        <label><input type="radio" name="sexo"> Femenino</label>
                    </div>
                </div>

                <div>
                    <label>Estado Civil</label>

                    <select>
                        <option>Seleccione</option>
                        <option>Soltero</option>
                        <option>Casado</option>
                        <option>Viudo</option>
                        <option>Divorciado</option>
                        <option>Separado</option>
                        <option>Unión de hecho</option>
                    </select>
                </div>

                <div>
                    <label>Obra Social</label>
                    <input type="text">
                </div>

                <div>
                    <label>A.F.J.P.</label>

                    <div class="radio-group">
                        <label><input type="radio" name="afjp"> Reparto</label>
                        <label><input type="radio" name="afjp"> Capitalización</label>
                    </div>
                </div>

                <div>
                    <label>Fecha de ingreso a la empresa</label>
                    <input type="date">
                </div>

                <div>
                    <label>Fecha de ingreso al establecimiento</label>
                    <input type="date">
                </div>

                <div>
                    <label>Antigüedad</label>
                    <input type="text">
                </div>

                <div>
                    <label>Situación contractual</label>
                    <input type="text">
                </div>

                <div>
                    <label>Turno de trabajo habitual</label>

                    <div class="radio-group">
                        <label><input type="radio" name="turno"> Fijo</label>
                        <label><input type="radio" name="turno"> Rotativo</label>
                    </div>
                </div>

                <div>
                    <label>Jornada habitual (Desde)</label>
                    <input type="time">
                </div>

                <div>
                    <label>Jornada habitual (Hasta)</label>
                    <input type="time">
                </div>

                <div class="full">
                    <label>Puesto de trabajo al momento del accidente</label>
                    <input type="text">
                </div>

                <div class="full">
                    <label>Puesto de trabajo anterior</label>
                    <input type="text">
                </div>

                <div>
                    <label>Fecha último examen periódico</label>
                    <input type="date">
                </div>

            </div>

        </section>

        <!-- EMPLEADOR -->

        <section class="card">

            <h3>Datos del Empleador</h3>

            <div class="grid">

                <div class="full">
                    <label>Nombre de la Empresa</label>
                    <input type="text">
                </div>

                <div>
                    <label>CUIT</label>
                    <input type="text">
                </div>

                <div>
                    <label>Contrato N°</label>
                    <input type="text">
                </div>

                <div>
                    <label>CIIU</label>
                    <input type="text">
                </div>

                <div class="full">
                    <label>Domicilio</label>
                    <input type="text">
                </div>

                <div>
                    <label>Provincia</label>
                    <input type="text">
                </div>

                <div>
                    <label>Localidad</label>
                    <input type="text">
                </div>

                <div>
                    <label>Código Postal</label>
                    <input type="text">
                </div>

                <div>
                    <label>Teléfono</label>
                    <input type="text">
                </div>

                <div>
                    <label>Fax</label>
                    <input type="text">
                </div>

                <div class="full">
                    <label>Email</label>
                    <input type="email">
                </div>

                <div class="full">
                    <label>Nombre del establecimiento donde ocurrió el accidente</label>
                    <input type="text">
                </div>

                <div>
                    <label>Código Establecimiento</label>
                    <input type="text">
                </div>

                <div>
                    <label>Empresa Subcontratada</label>

                    <div class="radio-group">
                        <label><input type="radio" name="sub"> Sí</label>
                        <label><input type="radio" name="sub"> No</label>
                    </div>
                </div>

            </div>

        </section>

        <!-- INFORMACION DEL SINIESTRO -->

        <section class="card">

            <h3>Información sobre el Siniestro</h3>

            <div class="grid">

                <div>
                    <label>Fecha del accidente</label>
                    <input type="date">
                </div>

                <div>
                    <label>Hora del accidente</label>
                    <input type="time">
                </div>

                <div>
                    <label>Tipo de siniestro</label>

                    <select>
                        <option>Seleccione</option>
                        <option>Accidente de trabajo</option>
                        <option>Enfermedad profesional</option>
                        <option>Accidente in itinere</option>
                    </select>
                </div>

                <div>
                    <label>¿Actividad habitual?</label>

                    <div class="radio-group">
                        <label><input type="radio" name="habitual"> Sí</label>
                        <label><input type="radio" name="habitual"> No</label>
                    </div>
                </div>

                <div class="full">
                    <label>Descripción del accidente y sus consecuencias</label>
                    <textarea rows="7"></textarea>
                </div>

                <div>
                    <label>Forma del accidente</label>
                    <input type="text">
                </div>

                <div>
                    <label>Agente Material Asociado</label>
                    <input type="text">
                </div>

                <div>
                    <label>Naturaleza de la lesión</label>
                    <input type="text">
                </div>

                <div>
                    <label>Zona del cuerpo afectada</label>
                    <input type="text">
                </div>

                <div class="full">
                    <label>Diagnóstico</label>
                    <textarea rows="5"></textarea>
                </div>

            </div>

        </section>

        <!-- ENFERMEDAD PROFESIONAL -->

        <section class="card">

            <h3>Enfermedad Profesional</h3>

            <div class="grid">

                <div class="full">
                    <label>Descripción de la Enfermedad Profesional</label>
                    <textarea rows="5"></textarea>
                </div>

                <div>
                    <label>Fecha de diagnóstico</label>
                    <input type="date">
                </div>

                <div>
                    <label>Tiempo de exposición</label>
                    <input type="text">
                </div>

                <div>
                    <label>Forma de diagnóstico</label>
                    <input type="text">
                </div>

                <div>
                    <label>Fecha inicio inasistencia laboral</label>
                    <input type="date">
                </div>

                <div>
                    <label>Centro asistencial</label>
                    <input type="text">
                </div>

                <div>
                    <label>Provincia</label>
                    <input type="text">
                </div>

                <div>
                    <label>Localidad</label>
                    <input type="text">
                </div>

            </div>

        </section>

        <!-- FIRMA -->

        <section class="card">

            <h3>Firma del Denunciante</h3>

            <div class="grid">

                <div>
                    <label>Lugar</label>
                    <input type="text">
                </div>

                <div>
                    <label>Fecha</label>
                    <input type="date">
                </div>

                <div class="full">
                    <label>Firma</label>
                    <input type="text">
                </div>

                <div>
                    <label>Aclaración</label>
                    <input type="text">
                </div>

                <div>
                    <label>DNI</label>
                    <input type="text">
                </div>

            </div>

        </section>

        <!-- BOTON -->

        <div class="btn-container">
            <button type="submit">
                Enviar Denuncia
            </button>
        </div>

    </div>

</body>

</html>
