<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Autorización - Pago Electrónico</title>
   <link rel="stylesheet" href="/Formularios/Autorizacion_Pago_Electronico/styles2.css">
</head>
<body>

  <div class="container">

    <h1>FORMULARIO DE AUTORIZACIÓN</h1> 
    <h2>PAGO ELECTRÓNICO</h2>

    <!-- DATOS DE IDENTIFICACIÓN -->
    <div class="section">
      <h3>Datos de Identificación del Empleador</h3>

      <div class="grid">

        <div>
          <label>Razón Social</label>
          <input type="text" required>
        </div>

        <div>
          <label>CUIT N°</label>
          <input type="text" required>
        </div>

        <div class="full">
          <label>Domicilio</label>
          <input type="text" required>
        </div>

        <div>
          <label>Contrato N°</label>
          <input type="text" required>
        </div>

        <div>
          <label>Localidad</label>
          <input type="text" required>
        </div>

        <div>
          <label>Teléfono</label>
          <input type="text">
        </div>

        <div>
          <label>E-mail</label>
          <input type="email">
        </div>

      </div>
    </div>

    <!-- DATOS BANCARIOS -->
    <div class="section">
      <h3>Datos de la Cuenta Bancaria</h3>

      <div class="grid">

        <div>
          <label>Titular de la Cuenta</label>
          <input type="text" required>
        </div>

        <div>
          <label>CUIT Titular de la Cuenta</label>
          <input type="text" required>
        </div>

        <div>
          <label>Número de Cuenta</label>
          <input type="text" required>
        </div>

        <div>
          <label>CBU</label>
          <input type="text" required>
        </div>

        <div>
          <label>Tipo de Cuenta</label>
          <select>
            <option>Seleccione</option>
            <option>Caja de Ahorro</option>
            <option>Cuenta Corriente</option>
          </select>
        </div>

        <div>
          <label>Sucursal del Banco</label>
          <input type="text" required>
        </div>

      </div>
    </div>

    <!-- BANCOS -->
    <div class="section">
      <h3>Banco</h3>

      <div class="banks">

        <label><input type="radio" name="banco"> Banco Nación</label>
        <label><input type="radio" name="banco"> Banco Galicia</label>
        <label><input type="radio" name="banco"> Banco Macro</label>
        <label><input type="radio" name="banco"> Banco Santander</label>
        <label><input type="radio" name="banco"> BBVA</label>
        <label><input type="radio" name="banco"> Banco Provincia</label>
        <label><input type="radio" name="banco"> Banco Supervielle</label>
        <label><input type="radio" name="banco"> Banco Patagonia</label>
        <label><input type="radio" name="banco"> HSBC</label>
        <label><input type="radio" name="banco"> Banco de Córdoba</label>
        <label><input type="radio" name="banco"> Otro</label>

      </div>
    </div>

    <!-- AUTORIZACIÓN -->
    <div class="section">
      <h3>TRANSFERENCIA ELECTRÓNICA DE FONDOS</h3>

      <textarea rows="18">
      "Por medio del presente autorizo a PREVENCIÓN ART SA a efectuar el pago por alguno de los siguientes conceptos:
      • Servicios prestados.
      • Reintegro de lo abonado en concepto de prestaciones dinerarias por Incapacidad Laboral Temporaria realizado por cuenta de esa Aseguradora de Riesgos del Trabajo (Art. 8 Dec. 491/97) a los trabajadores damnificados por accidentes de trabajo o enfermedades profesionales.
      • Prestaciones dinerarias de pago mensual establecida en el Art. 14 de la ley 24.557 que me corresponde por mi Incapacidad Laboral Permanente Provisoria, hasta tanto se declare el carácter definitivo de la misma, y/o por anticipos de prestaciones dinerarias correspondientes a Incapacidad Permanente Parcial Definitiva.
      • Así como todo pago cuyo destinatario sea la empresa que represento a través del sistema de Transferencia Electrónica de Fondos.
      Declarando bajo juramento la existencia de la cuenta bancaria y la veracidad de los datos que proporcionó respecto de la misma, liberando a PREVENCION ART SA de toda responsabilidad por los pagos efectuados a la cuenta cuyos datos figuran en el presente. 
      En caso de modificaciones a los mismos, los depósitos serán exigibles en la nueva cuenta a partir de los 15 días de la recepción
      de la comunicación fehaciente de tal circunstancia a PREVENCION ART SA.” 
      </textarea>

      <h3>COMPENSACIÓN</h3>

      <textarea rows="10">
      “Doy expresa conformidad para que PREVENCION ART SA proceda a compensar mis créditos originados en los conceptos precedentemente indicados, con deudas mantenidas con esa Aseguradora motivadas en la falta de pago de alícuotas aplicables al contrato de afiliación celebrado, imputándose a la cancelación parcial o total de ese concepto."
      Importante: Para considerar válido el presente formulario, debe estar firmado por el titular de la empresa.
      </textarea>
    </div>

    <!-- FIRMA -->
    <div class="section">
      <h3>Firma</h3>

      <div class="grid">

        <div>
          <label>Firma del Representante Legal / Titular</label>
          <input type="text">
        </div>

        <div>
          <label>Tipo y N° de Documento</label>
          <input type="text">
        </div>

        <div class="full">
          <label>Aclaración</label>
          <input type="text">
        </div>

      </div>
    </div>

    <!-- BOTÓN -->
    <div class="btn">
      <button type="submit">Enviar Formulario</button>
    </div>

  <footer>
    <p>
      PREVENCIÓN ART
    </p>
    
    <p>
      Ruta Nacional N° 34 km 257 - Sunchales - Santa Fe
    </p>

    <p>
      Tel: 0800 5555 ART (278)
    </p>
  </footer>

  </div>

</body>
</html>
